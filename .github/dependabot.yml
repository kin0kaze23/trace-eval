version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore(deps)"
